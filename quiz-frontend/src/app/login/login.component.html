<div class="page">

  <div class="login-card">

    <h1>Admin Login</h1>

    <input placeholder="Username" [(ngModel)]="username">
    <input type="password" placeholder="Password" [(ngModel)]="password">

    <button (click)="login()">Login</button>

    <p class="error">{{ error }}</p>

  </div>

</div>
